<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - Ankita Electrician</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    
    <!-- Sidebar / Menu -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Admin Panel</h2>
        </div>
        <ul class="nav-links">
            <!-- 1. Dashboard Tab -->
            <li class="active" onclick="switchTab('dashboard-view', this)">
                <img src="image/Dashboard.png" alt="Dashboard">
                <span>Dashboard</span>
            </li>
            
            <!-- 2. Customers Tab -->
            <li onclick="switchTab('customers-view', this)">
                <img src="image/user.png" alt="Customers">
                <span>Customers</span>
            </li>
            
            <!-- 3. Feedback Tab -->
            <li onclick="switchTab('feedback-view', this)">
                <img src="image/star-feedback.png" alt="Feedback">
                <span>Feedback</span>
            </li>
        </ul>
        <div class="logout-box">
             <a href="index.html" class="logout-btn">
                <img src="image/logout.png" alt="Logout Icon">
                <span>Logout</span>
             </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Top Navigation -->
        <header class="top-nav">
             <div class="welcome-text">
                  <h1>Welcome Back, Ankur! 👋</h1>
                  <p>Here is the status of your business today.</p>
             </div>
        </header>

        <!-- Dashboard Cards (Report Cards) -->
        <section class="cards-section">
            <div class="card card-blue" onclick="filterTable('All')" style="cursor: pointer;" title="Show All Bookings">
                <div class="card-info">
                    <h3>Total Bookings</h3>
                    <h2 id="total-count">...</h2>
                </div>
                <div class="card-icon"><img src="image/booking-list.png" alt="icon"></div>
            </div>

            <div class="card card-yellow" onclick="filterTable('Pending')" style="cursor: pointer;" title="Show Pending Only">
                <div class="card-info">
                    <h3>Pending Work</h3>
                    <h2 id="pending-count">...</h2>
                </div>
                <div class="card-icon"><img src="image/booking-list.png" alt="icon"></div>
            </div>

            <div class="card card-green" onclick="filterTable('Completed')" style="cursor: pointer;" title="Show Completed Only">
                <div class="card-info">
                    <h3>Completed Jobs</h3>
                    <h2 id="completed-count">...</h2>
                </div>
                <div class="card-icon"><img src="image/check-mark.png" alt="icon"></div>
            </div>

            <div class="card card-red" style="cursor: default;">
                <div class="card-info">
                    <h3>Average Rating</h3>
                    <h2 id="average-rating">0 ⭐</h2>
                </div>
                <div class="card-icon"><img src="image/star-feedback.png" alt="icon"></div>
            </div>
        </section>

        <!-- Recent Bookings Table -->
        <section class="table-section">
            <div class="table-header">
                <h2>Recent Bookings</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Customer Name</th>
                            <th>Service</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="5" style="text-align: center;">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- API se Data laane wala JavaScript -->
    <script>
    const apiUrl = "https://script.google.com/macros/s/AKfycbyKiVCEofGbmMw6rTDJUmdHvrPjCioFJMoL_aQoUeQEp-SkdClJJdr05ct-BwCZ6fBfgA/exec";

    // --- 1. SIDE MENU (TAB) BADALNE KA MAGIC ---
    function switchTab(tabId, clickedElement) {
        // Saare views ko chhupao
        let views = document.querySelectorAll('.view-section');
        views.forEach(view => view.style.display = 'none');
        
        // Jisko click kiya usko dikhao
        let targetView = document.getElementById(tabId);
        if(targetView) targetView.style.display = 'block';
        
        // Menu me se purana active (highlight) hatao aur naye par lagao
        let menuItems = document.querySelectorAll('li');
        menuItems.forEach(item => item.classList.remove('active'));
        if(clickedElement) clickedElement.classList.add('active');
    }

    // --- 2. DATA LAANE AUR BUTTONS BANANE KA KAAM ---
    async function fetchDashboardData() {
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            
            let bookings = data.bookings;
            let feedbacks = data.feedbacks;
            
            let total = bookings.length;
            let pending = 0;
            let completed = 0;
            let tableHTML = "";
            
            for(let i = bookings.length - 1; i >= 0; i--) {
                let row = bookings[i];
                
                if(row.status === "Pending") pending++;
                else if(row.status === "Completed") completed++;
                
                let dateObj = new Date(row.timestamp);
                let formattedDate = dateObj.toLocaleDateString('en-IN');
                
                let statusClass = row.status === "Completed" ? "completed" : (row.status === "Cancelled" ? "cancelled" : "pending");

                // ACTION BUTTONS YAHAN HAIN!
                let actionButtons = row.status === "Pending" ? `
                    <button class="action-btn" onclick="updateStatus(${row.rowIndex}, 'Completed')" title="Mark Complete"><img src="image/check-mark.png" alt="Complete" style="width:20px;"></button>
                    <button class="action-btn" onclick="updateStatus(${row.rowIndex}, 'Cancelled')" title="Cancel Booking"><img src="image/cancel.png" alt="Cancel" style="width:20px;"></button>
                ` : `<span style="color: gray; font-size: 13px; font-weight: bold;">${row.status}</span>`;

                tableHTML += `
                <tr>
                    <td><strong>${row.name}</strong><br><small style="color: gray;">${row.phone}</small></td>
                    <td>${row.service}</td>
                    <td>${formattedDate}</td>
                    <td><span class="status ${statusClass}">${row.status}</span></td>
                    <td>${actionButtons}</td>
                </tr>`;
            }
            
            document.getElementById('total-count').innerText = total;
            document.getElementById('pending-count').innerText = pending;
            document.getElementById('completed-count').innerText = completed;
            
            document.getElementById('table-body').innerHTML = total === 0 ? `<tr><td colspan="5" style="text-align: center;">No bookings yet!</td></tr>` : tableHTML;

            // FEEDBACK AUR RATING CALCULATION
            if (feedbacks.length === 0) {
                document.getElementById('average-rating').innerText = "0 ⭐";
            } else {
                let totalRate = 0;
                feedbacks.forEach(f => totalRate += Number(f.rating));
                let avg = (totalRate / feedbacks.length).toFixed(1);
                document.getElementById('average-rating').innerText = `${avg} ⭐`;
            }
            
        } catch(error) {
            console.error("Data laane me error:", error);
        }
    }

    // --- 3. TICK (✔️) AUR CROSS (❌) KA LOGIC ---
    async function updateStatus(rowIndex, newStatus) {
        let confirmAction = confirm(`Kya aap sach me is booking ko '${newStatus}' karna chahte hain?`);
        if(!confirmAction) return;

        let formData = new FormData();
        formData.append("action", "update");
        formData.append("rowIndex", rowIndex);
        formData.append("status", newStatus);

        try {
            const response = await fetch(apiUrl, { method: 'POST', body: formData });
            const result = await response.json();
            
            if(result.result === "success") {
                fetchDashboardData(); // Table refresh karega
            } else {
                alert("Sheet update karne mein error aayi.");
            }
        } catch(error) {
            alert("Internet connection check karein.");
        }
    }

    // Window khulte hi data load ho jaye
    window.onload = fetchDashboardData;
</script>
</body>
</html>
